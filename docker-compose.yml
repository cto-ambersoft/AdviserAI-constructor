services:
  postgres:
    image: postgres:17-alpine
    container_name: trade_platform_postgres
    environment:
      POSTGRES_DB: trade_platform
      POSTGRES_USER: trade_user
      POSTGRES_PASSWORD: trade_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_user -d trade_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # redis:
